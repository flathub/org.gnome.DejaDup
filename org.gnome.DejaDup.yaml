---
id: org.gnome.DejaDup
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: deja-dup

finish-args:
  # Filesystem access
  - --filesystem=host
  - --filesystem=~/.var/app/ # flatpak hides these even with 'host' above

  # GTK
  - --device=dri
  - --socket=wayland

  # GVfs
  # - https://github.com/flatpak/xdg-desktop-portal/discussions/1287 asks for a removable drive
  #   portal (would it let us identify by UUID?)
  # - https://github.com/flatpak/xdg-desktop-portal/issues/102 asks for a network mount portal
  - --filesystem=xdg-run/gvfs # for gvfsd-fuse paths
  - --filesystem=xdg-run/gvfsd # for gvfsd itself to work
  - --talk-name=org.gtk.MountOperationHandler # allows certain gvfs mount prompts on shell-side
  - --talk-name=org.gtk.vfs.*

  # Mounting via the host's fusermount
  # - https://github.com/flatpak/xdg-desktop-portal/issues/695 asks for a fusermount portal
  - --filesystem=xdg-run/deja-dup:create
  - --talk-name=org.freedesktop.Flatpak

  # Network access
  - --share=network
  - --socket=ssh-auth

  # X11
  - --share=ipc
  - --socket=fallback-x11

  # Waiting for new xdg-desktop-portal versions to be widespread
  - --talk-name=com.feralinteractive.GameMode # 1.16.0 (2022)

build-options:
  append-path: /usr/lib/sdk/golang/bin
  env:
    GOBIN: /app/bin
    GOEXPERIMENT: nodwarf5 # to quiet debugedit error messages

modules:
  - name: librsync
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/librsync/librsync.git
        tag: v2.3.4
        commit: e364852674780e43d578e4239128ff7014190ed3

  # Manually specify duplicity here (plus with --no-deps), rather than use update-python.sh for it,
  # because it hard-depends on all of its backend dependencies, so flatpak-pip-generator would try
  # to gather all its deps. Which would be rather annoying for us, as we only need rclone.
  - name: duplicity
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "duplicity" --no-build-isolation --no-deps
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/16/96/fc07257297b433c19162764f8c3b8649cf788201890c2563476570e1167e/duplicity-3.0.7.tar.gz
        sha256: 464245217285012e8e0c74ad3edf16be7ff4801caa5272745f10d93a2a7de44e
  - duplicity.deps.yaml

  - name: rclone
    buildsystem: simple
    build-commands:
      - go install -mod=vendor -ldflags='-extldflags=-fuse-ld=bfd'
    sources:
      - type: git
        url: https://github.com/rclone/rclone
        tag: v1.73.5
        commit: 2c12ca64d451d79252982fcf96b09dff1d55b55e
      - rclone.go.mod.yml

  - name: restic
    buildsystem: simple
    build-commands:
      - go install -mod=vendor ./cmd/restic
    sources:
      - type: git
        url: https://github.com/restic/restic
        tag: v0.17.3
        commit: bc64921a8ea73dfaeaf4d9b66676a76998e144fc
      - restic.go.mod.yml

  - name: deja-dup
    buildsystem: meson
    builddir: true
    config-opts:
      - --buildtype=release
    sources:
      - type: git
        url: https://gitlab.gnome.org/World/deja-dup.git
        commit: 2ca7ac3dc4487e2671934e3a4b5c34b5f645a5b4
